name: Update rule-sets

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: update-rule-sets
  cancel-in-progress: false

jobs:
  update:
    name: Generate and commit rule-sets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build rule-sets
        run: ./build.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rule-set-geoip rule-set-geosite
          if git diff --cached --quiet; then
            echo "No rule-set changes."
          else
            git commit -m "Update rule-sets ($(date -u +%Y-%m-%d))"
            git push
          fi
